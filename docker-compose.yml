services:
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: knesset-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true  # Local dev only — no auth overhead
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=K9nesset_Dev!2026  # Required by init script even when security is disabled
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - path.repo=/usr/share/opensearch/snapshots
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q opensearch"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: knessy-app
    env_file: .env
    environment:
      - OPENSEARCH_HOST=opensearch
      - PYTHONPATH=.
    ports:
      - "7860:7860"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: on-failure

volumes:
  opensearch-data:

services:
  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: knesset-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true  # Local dev only — no auth overhead
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=K9nesset_Dev!2026  # Required by init script even when security is disabled
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  opensearch-data:
